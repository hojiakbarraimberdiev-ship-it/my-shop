<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Каталог товаров — Hoji.tech</title>
  <meta name="description" content="Каталог компьютеров и ноутбуков Hoji.tech. Фильтры по бренду, типу, состоянию и цене.">
  <meta property="og:title" content="Каталог — Hoji.tech">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "CollectionPage",
    "name": "Каталог Hoji.tech",
    "description": "Компьютеры и ноутбуки"
  }
  </script>
</head>
<body>
  <header class="header" id="header">
    <div class="container header__inner">
      <a href="index.html" class="header__logo">
        <span class="logo-icon">⟨/⟩</span>
        <span class="logo-text">Hoji<span class="accent">.Tech</span></span>
      </a>
      <nav class="header__nav" id="mainNav">
        <a href="catalog.html" class="nav-link active">Каталог</a>
        <a href="about.html" class="nav-link">О нас</a>
        <a href="contacts.html" class="nav-link">Контакты</a>
      </nav>
      <div class="header__actions">
        <button class="btn-icon theme-toggle" id="themeToggle" aria-label="Тема"><span class="theme-icon">◑</span></button>
        <a href="cart.html" class="btn-icon cart-btn"><span class="cart-icon">◫</span><span class="cart-badge" id="cartBadge" style="display:none">0</span></a>
        <a href="login.html" class="btn-icon" id="authBtn"><span>◎</span></a>
        <button class="btn-icon burger" id="burger"><span></span><span></span><span></span></button>
      </div>
    </div>
  </header>

  <main class="catalog-page">
    <div class="container">
      <div class="page-header">
        <h1 class="page-title">Каталог</h1>
        <div class="breadcrumb"><a href="index.html">Главная</a> / <span>Каталог</span></div>
      </div>

      <!-- SEARCH BAR -->
      <div class="catalog-search">
        <div class="search-wrap">
          <span class="search-icon">⌕</span>
          <input type="search" id="searchInput" class="search-input" placeholder="Поиск товаров..." autocomplete="off">
          <button class="search-clear" id="searchClear" style="display:none">✕</button>
        </div>
      </div>

      <div class="catalog-layout">
        <!-- FILTERS SIDEBAR -->
        <aside class="filters" id="filtersPanel">
          <div class="filters__header">
            <h3>Фильтры</h3>
            <button class="btn-text" id="resetFilters">Сбросить</button>
          </div>

          <div class="filter-group">
            <h4 class="filter-group__title">Тип устройства</h4>
            <label class="filter-checkbox">
              <input type="checkbox" name="type" value="pc"> <span>Настольный ПК</span>
            </label>
            <label class="filter-checkbox">
              <input type="checkbox" name="type" value="laptop"> <span>Ноутбук</span>
            </label>
          </div>

          <div class="filter-group">
            <h4 class="filter-group__title">Состояние</h4>
            <label class="filter-checkbox">
              <input type="checkbox" name="condition" value="new"> <span>Новый</span>
            </label>
            <label class="filter-checkbox">
              <input type="checkbox" name="condition" value="used"> <span>Б/У</span>
            </label>
          </div>

          <div class="filter-group">
            <h4 class="filter-group__title">Бренд</h4>
            <div id="brandFilters">
              <!-- Generated by JS -->
            </div>
          </div>

          <div class="filter-group">
            <h4 class="filter-group__title">Цена, ⃀</h4>
            <div class="price-range">
              <input type="number" id="priceMin" class="price-input" placeholder="От" min="0">
              <span class="price-range__sep">—</span>
              <input type="number" id="priceMax" class="price-input" placeholder="До">
            </div>
            <div class="price-slider-wrap">
              <input type="range" id="priceSlider" class="price-slider" min="0" max="200000" value="200000">
            </div>
          </div>

          <button class="btn btn--primary w-full" id="applyFilters">Применить</button>
        </aside>

        <!-- PRODUCTS AREA -->
        <div class="catalog-main">
          <div class="catalog-toolbar">
            <div class="catalog-count">
              Найдено: <span id="productsCount">0</span> товаров
            </div>
            <div class="catalog-sort">
              <label for="sortSelect">Сортировка:</label>
              <select id="sortSelect" class="sort-select">
                <option value="popular">По популярности</option>
                <option value="price_asc">Цена: по возрастанию</option>
                <option value="price_desc">Цена: по убыванию</option>
                <option value="name_asc">По названию</option>
              </select>
            </div>
            <button class="btn-icon filters-toggle" id="filtersToggle" aria-label="Фильтры">⚙</button>
          </div>

          <div class="products-grid" id="catalogGrid">
            <!-- Products rendered by JS -->
            <div class="product-card skeleton"></div>
            <div class="product-card skeleton"></div>
            <div class="product-card skeleton"></div>
            <div class="product-card skeleton"></div>
            <div class="product-card skeleton"></div>
            <div class="product-card skeleton"></div>
          </div>

          <div class="catalog-empty" id="catalogEmpty" style="display:none">
            <div class="empty-icon">🔍</div>
            <h3>Ничего не найдено</h3>
            <p>Попробуйте изменить фильтры или поисковый запрос</p>
            <button class="btn btn--primary" id="resetFiltersEmpty">Сбросить фильтры</button>
          </div>

          <!-- PAGINATION -->
          <div class="pagination" id="pagination"></div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container footer__inner">
      <div class="footer__brand">
        <a href="index.html" class="header__logo"><span class="logo-icon">⟨/⟩</span><span class="logo-text">Hoji<span class="accent">.Tech</span></span></a>
      </div>
      <div class="footer__links">
        <div class="footer__col">
          <h4>Категории</h4>
          <a href="catalog.html?type=pc">ПК</a>
          <a href="catalog.html?type=laptop">Ноутбуки</a>
          <a href="catalog.html?condition=used">Б/У</a>
        </div>
      </div>
    </div>
    <div class="footer__bottom"><div class="container"><span>© 2025 Hoji.tech</span></div></div>
  </footer>

  <div class="toast-container" id="toastContainer"></div>
  <div class="nav-overlay" id="navOverlay"></div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
