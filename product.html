<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pageTitle">Товар — Hoji.tech</title>
  <meta name="description" id="pageDesc" content="Описание товара Hoji.tech">
  <meta property="og:title" id="ogTitle" content="Товар — Hoji.tech">
  <meta property="og:type" content="product">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header" id="header">
    <div class="container header__inner">
      <a href="index.html" class="header__logo"><span class="logo-icon">⟨/⟩</span><span class="logo-text">Hoji<span class="accent">.Tech</span></span></a>
      <nav class="header__nav" id="mainNav">
        <a href="catalog.html" class="nav-link">Каталог</a>
        <a href="about.html" class="nav-link">О нас</a>
        <a href="contacts.html" class="nav-link">Контакты</a>
      </nav>
      <div class="header__actions">
        <button class="btn-icon theme-toggle" id="themeToggle"><span class="theme-icon">◑</span></button>
        <a href="cart.html" class="btn-icon cart-btn"><span class="cart-icon">◫</span><span class="cart-badge" id="cartBadge" style="display:none">0</span></a>
        <a href="login.html" class="btn-icon" id="authBtn"><span>◎</span></a>
        <button class="btn-icon burger" id="burger"><span></span><span></span><span></span></button>
      </div>
    </div>
  </header>

  <main class="product-page">
    <div class="container">
      <!-- BREADCRUMB -->
      <div class="breadcrumb" id="breadcrumb">
        <a href="index.html">Главная</a> / <a href="catalog.html">Каталог</a> / <span id="breadcrumbTitle">...</span>
      </div>

      <!-- LOADING SKELETON -->
      <div class="product-skeleton" id="productSkeleton">
        <div class="product-skeleton__gallery skeleton"></div>
        <div class="product-skeleton__info">
          <div class="skeleton skeleton--line" style="width:60%;height:32px;margin-bottom:16px"></div>
          <div class="skeleton skeleton--line" style="width:40%;height:24px;margin-bottom:32px"></div>
          <div class="skeleton skeleton--line" style="width:30%;height:40px;margin-bottom:16px"></div>
          <div class="skeleton" style="height:48px;margin-bottom:12px;border-radius:8px"></div>
        </div>
      </div>

      <!-- PRODUCT CONTENT -->
      <div class="product-detail" id="productDetail" style="display:none">
        <!-- Gallery -->
        <div class="product-gallery">
          <div class="gallery-main">
            <img id="galleryMain" src="" alt="" class="gallery-main__img" loading="eager">
            <div class="gallery-zoom" id="galleryZoom">🔍</div>
          </div>
          <div class="gallery-thumbs" id="galleryThumbs"></div>
        </div>

        <!-- Info -->
        <div class="product-info">
          <div class="product-badges" id="productBadges"></div>
          <h1 class="product-title" id="productTitle"></h1>
          <div class="product-meta">
            <span class="product-brand" id="productBrand"></span>
            <span class="product-sku">SKU: <span id="productSku"></span></span>
          </div>

          <div class="product-price-block">
            <span class="product-price" id="productPrice"></span>
            <span class="product-price-old" id="productPriceOld"></span>
          </div>

          <div class="product-availability" id="productAvailability">
            <span class="dot dot--green"></span> В наличии
          </div>

          <div class="product-actions">
            <div class="qty-control">
              <button class="qty-btn" id="qtyMinus">−</button>
              <input type="number" id="qtyInput" value="1" min="1" max="99" class="qty-input">
              <button class="qty-btn" id="qtyPlus">+</button>
            </div>
            <button class="btn btn--primary btn--lg flex-1" id="addToCartBtn">
              Добавить в корзину
            </button>
          </div>

          <div class="product-delivery">
            <div class="delivery-item"><span>🚚</span> Доставка по городу Ошу — в день заказа</div>
            <div class="delivery-item"><span>📦</span> Самовывоз — бесплатно</div>
            <div class="delivery-item"><span>🛡</span> Гарантия <span id="productWarranty"></span></div>
          </div>
        </div>
      </div>

      <!-- TABS -->
      <div class="product-tabs" id="productTabs" style="display:none">
        <div class="tabs-nav">
          <button class="tab-btn active" data-tab="specs">Характеристики</button>
          <button class="tab-btn" data-tab="description">Описание</button>
        </div>
        <div class="tab-content active" id="tab-specs">
          <table class="specs-table" id="specsTable"></table>
        </div>
        <div class="tab-content" id="tab-description">
          <div class="product-description" id="productDescription"></div>
        </div>
      </div>

      <!-- RELATED -->
      <div class="related-section" id="relatedSection" style="display:none">
        <h2 class="section-title">Похожие товары</h2>
        <div class="products-grid" id="relatedGrid"></div>
      </div>
    </div>
  </main>

  <!-- ZOOM MODAL -->
  <div class="zoom-modal" id="zoomModal" style="display:none">
    <div class="zoom-modal__backdrop" id="zoomBackdrop"></div>
    <div class="zoom-modal__content">
      <img id="zoomImg" src="" alt="">
      <button class="zoom-close" id="zoomClose">✕</button>
    </div>
  </div>

  <footer class="footer">
    <div class="footer__bottom"><div class="container"><span>© 2025 Hoji.tech</span></div></div>
  </footer>

  <div class="toast-container" id="toastContainer"></div>
  <div class="nav-overlay" id="navOverlay"></div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
